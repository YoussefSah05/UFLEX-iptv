name: YOUFLEX

options:
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_NAME: $(TARGET_NAME)
    GENERATE_INFOPLIST_FILE: NO

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.0.0
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: 12.0.0
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 0.8.0

targets:
  YOUFLEXiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: YOUFLEXShared
      - path: YOUFLEXiOS
    dependencies:
      - package: GRDB
      - package: Nuke
      - package: WhisperKit
    info:
      path: YOUFLEXiOS/Info.plist
      properties:
        CFBundleDisplayName: YOUFLEX
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        LSApplicationCategoryType: public.app-category.entertainment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youflex.apple.ios
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO

  YOUFLEXmacOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: YOUFLEXShared
      - path: YOUFLEXmacOS
    dependencies:
      - package: GRDB
      - package: Nuke
      - package: WhisperKit
    info:
      path: YOUFLEXmacOS/Info.plist
      properties:
        CFBundleDisplayName: YOUFLEX
        LSApplicationCategoryType: public.app-category.entertainment
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youflex.apple.macos
        CODE_SIGN_STYLE: Automatic

  YOUFLEXTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: YOUFLEXTests
    dependencies:
      - target: YOUFLEXiOS
      - package: GRDB
    info:
      path: YOUFLEXTests/Info.plist
      properties: {}

  YOUFLEXUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: YOUFLEXUITests
    dependencies:
      - target: YOUFLEXiOS
    info:
      path: YOUFLEXUITests/Info.plist
      properties: {}
